name: Publish to NPM

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build
        
      - name: Check if version needs publishing
        id: check
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          REMOTE_VERSION=$(npm show khoji version 2>/dev/null || echo "0.0.0")
          
          if [ "$LOCAL_VERSION" != "$REMOTE_VERSION" ]; then
            echo "Current version v$LOCAL_VERSION differs from remote v$REMOTE_VERSION. Publishing..."
            echo "publish=true" >> $GITHUB_OUTPUT
          else
            echo "Version v$LOCAL_VERSION is already published. Skipping."
            echo "publish=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Publish to NPM
        if: steps.check.outputs.publish == 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
